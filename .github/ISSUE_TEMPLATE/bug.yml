name: 🐛 Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: input
    id: badge-url
    attributes:
      label: Badge URL
      description: The full badge URL that's broken (if applicable)
      placeholder: https://shieldcn.dev/npm/react.svg
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: The badge shows "unknown" instead of the version number
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: If applicable, add a screenshot of the broken badge
    validations:
      required: false

  - type: dropdown
    id: format
    attributes:
      label: Badge format
      options:
        - SVG
        - PNG
        - JSON
        - All formats
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other details — browser, where the badge is embedded, query params used, etc.
    validations:
      required: false
