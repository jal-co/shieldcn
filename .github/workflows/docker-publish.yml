name: Publish Engine Docker Image

on:
  push:
    tags: ["engine@*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#engine@}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/engine/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/engine:latest
            ghcr.io/${{ github.repository }}/engine:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
